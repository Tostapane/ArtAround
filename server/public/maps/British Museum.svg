<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" class="museum-map">
  <!-- Cornice / muro perimetrale dell'edificio -->
  <rect x="10" y="10" width="780" height="580" fill="#fbfbf9" stroke="#333" stroke-width="4" />

  <!-- Sale (AREE data-room): la Sala Centrale rettangolare al centro, quattro ali
       intorno. Ogni area ha il suo colore; il nodo/ostacolo prende la sala la cui
       area lo contiene. Le aree si toccano senza sovrapporsi. -->
  <g pointer-events="none">
    <rect data-room="Sala Centrale" x="280" y="220" width="240" height="160" fill="#fdf6e3" />
    <rect data-room="Ala Nord"      x="10"  y="10"  width="780" height="210" fill="#dceefb" />
    <rect data-room="Ala Sud"       x="10"  y="380" width="780" height="210" fill="#dcf5e3" />
    <rect data-room="Ala Ovest"     x="10"  y="220" width="270" height="160" fill="#fde7d2" />
    <rect data-room="Ala Est"       x="520" y="220" width="270" height="160" fill="#f8dde6" />
  </g>

  <!-- Etichette delle sale -->
  <g font-family="sans-serif" font-size="13" font-weight="600" fill="#5a5a5a" text-anchor="middle" pointer-events="none">
    <text x="400" y="28">Ala Nord</text>
    <text x="400" y="575">Ala Sud</text>
    <text x="120" y="240">Ala Ovest</text>
    <text x="680" y="240">Ala Est</text>
    <text x="400" y="215">Sala Centrale</text>
  </g>

  <!-- Muri interni: linee con un VARCO = porta. La Sala Centrale ha una porta su
       ogni lato verso l'ala corrispondente; il resto dei divisori e' muro pieno. -->
  <g stroke="#333" stroke-width="4" stroke-linecap="square">
    <!-- muro y=220 (Ala Nord | fascia centrale), varco a x=400 verso la Sala Centrale -->
    <line x1="10"  y1="220" x2="380" y2="220" />
    <line x1="420" y1="220" x2="790" y2="220" />
    <!-- muro y=380 (fascia centrale | Ala Sud), varco a x=400 -->
    <line x1="10"  y1="380" x2="380" y2="380" />
    <line x1="420" y1="380" x2="790" y2="380" />
    <!-- muro x=280 (Ala Ovest | Sala Centrale), varco a y=300 -->
    <line x1="280" y1="220" x2="280" y2="280" />
    <line x1="280" y1="320" x2="280" y2="380" />
    <!-- muro x=520 (Sala Centrale | Ala Est), varco a y=300 -->
    <line x1="520" y1="220" x2="520" y2="280" />
    <line x1="520" y1="320" x2="520" y2="380" />
  </g>

  <!-- Grafo di navigazione: ogni <line data-edge> collega la Sala Centrale a
       un'ala passando per il varco. Quasi invisibile. -->
  <g id="nav-edges" stroke="#6b7c8a" stroke-width="1.5" stroke-dasharray="3,5" opacity="0.08">
    <line data-edge x1="400" y1="190" x2="400" y2="250" /> <!-- Sala Centrale <-> Ala Nord -->
    <line data-edge x1="400" y1="350" x2="400" y2="410" /> <!-- Sala Centrale <-> Ala Sud -->
    <line data-edge x1="250" y1="300" x2="310" y2="300" /> <!-- Ala Ovest <-> Sala Centrale -->
    <line data-edge x1="490" y1="300" x2="550" y2="300" /> <!-- Sala Centrale <-> Ala Est -->
  </g>

  <!-- Nodi-opera: id="art-N" combacia con la posizione N in activeArtworks (il
       seed assegna locationId=art-N in quell'ordine) e data-qid col relativo qid. -->
  <!-- Sala Centrale -->
  <circle id="art-1"  class="interactive-node" data-qid="Q137925932" cx="400" cy="300" r="14" fill="#333" />
  <!-- Ala Nord -->
  <circle id="art-2"  class="interactive-node" data-qid="Q110812274" cx="400" cy="95"  r="10" fill="gray" />
  <rect   id="art-6"  class="interactive-node" data-qid="Q104411621" x="138" y="80"  width="24" height="24" fill="gray" />
  <rect   id="art-7"  class="interactive-node" data-qid="Q212616"    x="628" y="80"  width="24" height="24" fill="gray" />
  <circle id="art-10" class="interactive-node" data-qid="Q95571270"  cx="260" cy="165" r="10" fill="gray" />
  <circle id="art-11" class="interactive-node" data-qid="Q1992041"   cx="540" cy="165" r="10" fill="gray" />
  <!-- Ala Sud -->
  <circle id="art-3"  class="interactive-node" data-qid="Q216402"    cx="400" cy="500" r="10" fill="gray" />
  <rect   id="art-8"  class="interactive-node" data-qid="Q28110217"  x="138" y="488" width="24" height="24" fill="gray" />
  <rect   id="art-9"  class="interactive-node" data-qid="Q117745912" x="628" y="488" width="24" height="24" fill="gray" />
  <circle id="art-12" class="interactive-node" data-qid="Q28128822"  cx="260" cy="450" r="10" fill="gray" />
  <circle id="art-13" class="interactive-node" data-qid="Q21518246"  cx="540" cy="450" r="10" fill="gray" />
  <!-- Ala Ovest -->
  <circle id="art-4"  class="interactive-node" data-qid="Q107343185" cx="140" cy="300" r="10" fill="gray" />
  <!-- Ala Est -->
  <circle id="art-5"  class="interactive-node" data-qid="Q102257724" cx="650" cy="300" r="10" fill="gray" />

  <!-- Punti di interesse (POI): data-poi = tipo, data-label = nome mostrato/letto. -->
  <g id="pois" font-family="sans-serif" font-size="12" fill="#1d4ed8" text-anchor="middle">
    <circle class="poi-node" data-poi="exit" data-label="Uscita" cx="400" cy="560" r="8" fill="#1d4ed8" />
    <text x="400" y="582">Uscita</text>
    <circle class="poi-node" data-poi="shop" data-label="Bookshop" cx="500" cy="545" r="8" fill="#1d4ed8" />
    <text x="500" y="567">Shop</text>
    <circle class="poi-node" data-poi="toilet" data-label="Toilette" cx="740" cy="300" r="8" fill="#1d4ed8" />
    <text x="740" y="322">WC</text>
    <circle class="poi-node" data-poi="bar" data-label="Caffetteria" cx="60" cy="300" r="8" fill="#1d4ed8" />
    <text x="60" y="322">Bar</text>
    <circle class="poi-node" data-poi="emergency_exit" data-label="Uscita di emergenza" cx="640" cy="40" r="8" fill="#16a34a" />
    <text x="640" y="27" fill="#16a34a">SOS</text>
  </g>

  <!-- Ostacoli di accessibilita': data-obstacle = tipo, data-desc = descrizione.
       La POSIZIONE del marker decide in quale sala (area) ricade. -->
  <g id="obstacles" fill="#dc2626" opacity="0.85">
    <rect class="obstacle-marker" data-obstacle="steps" data-desc="due gradini verso l'uscita nord della Sala Centrale" x="355" y="245" width="12" height="12" />
    <rect class="obstacle-marker" data-obstacle="chairs" data-desc="alcune sedie disposte a meta' sala" x="294" y="445" width="12" height="12" />
  </g>
</svg>
