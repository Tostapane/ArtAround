<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ArtAround — guida accessibile per visitare le opere del museo." />
    <title>ArtAround — Visita guidata</title>
    <!--
      Anti-FOUC: applica il tema (chiaro/scuro) prima del primo paint,
      leggendo la preferenza salvata o quella di sistema. Tenuto in sync con useTheme.ts.
    -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("artaround-theme");
          var dark =
            saved === "dark" ||
            (saved !== "light" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <div id="dropDown"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
